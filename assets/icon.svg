<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Gatekeeper">
  <title>Gatekeeper</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="planeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3aa6e8"/>
      <stop offset="100%" stop-color="#1c7ab3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>

  <g stroke="#1e3a5f" stroke-width="0.6" opacity="0.55">
    <path d="M0 64 L256 64 M0 128 L256 128 M0 192 L256 192"/>
    <path d="M64 0 L64 256 M128 0 L128 256 M192 0 L192 256"/>
  </g>
  <g fill="#22d3ee" opacity="0.55">
    <circle cx="64" cy="64" r="1.6"/>
    <circle cx="192" cy="64" r="1.6"/>
    <circle cx="64" cy="192" r="1.6"/>
    <circle cx="192" cy="192" r="1.6"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M128 34 L210 62 L210 130 C210 184 172 212 128 224 C84 212 46 184 46 130 L46 62 Z"
          fill="url(#shieldGrad)" stroke="#e6f7ff" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <g stroke="#0a1929" stroke-width="8" stroke-linecap="round" opacity="0.95">
    <line x1="86" y1="100" x2="170" y2="100"/>
    <line x1="98" y1="108" x2="98" y2="186"/>
    <line x1="128" y1="108" x2="128" y2="186"/>
    <line x1="158" y1="108" x2="158" y2="186"/>
  </g>
  <g stroke="#0a1929" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="86" y1="148" x2="170" y2="148"/>
  </g>

  <g transform="translate(196 56)">
    <circle r="32" fill="url(#planeGrad)" stroke="#e6f7ff" stroke-width="3"/>
    <path d="M-15 2 L17 -13 L11 17 L4 9 L-2 14 L-2 6 Z" fill="#ffffff" stroke="#ffffff" stroke-width="0.5" stroke-linejoin="round"/>
    <path d="M-15 2 L11 17 L4 9 Z" fill="#cfe9ff" opacity="0.75"/>
  </g>
</svg>
