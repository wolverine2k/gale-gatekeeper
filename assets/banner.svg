<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Gatekeeper - Telegram Network Access Control for OpenWrt">
  <title>Gatekeeper - Telegram Network Access Control for OpenWrt</title>
  <defs>
    <linearGradient id="bgBanner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06121f"/>
      <stop offset="55%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#0e2c4f"/>
    </linearGradient>
    <linearGradient id="shieldGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="planeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3aa6e8"/>
      <stop offset="100%" stop-color="#1c7ab3"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9be8f7"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="bannerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="320" fill="url(#bgBanner)"/>

  <g stroke="#1e3a5f" stroke-width="0.8" opacity="0.45">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200"/>
    <path d="M60 0 V320 M120 0 V320 M180 0 V320 M240 0 V320 M300 0 V320 M360 0 V320 M420 0 V320 M480 0 V320 M540 0 V320 M600 0 V320 M660 0 V320 M720 0 V320 M780 0 V320 M840 0 V320 M900 0 V320 M960 0 V320 M1020 0 V320 M1080 0 V320 M1140 0 V320"/>
  </g>
  <g fill="#22d3ee" opacity="0.55">
    <circle cx="60"  cy="60"  r="1.5"/>
    <circle cx="180" cy="120" r="1.5"/>
    <circle cx="300" cy="60"  r="1.5"/>
    <circle cx="420" cy="240" r="1.5"/>
    <circle cx="540" cy="180" r="1.5"/>
    <circle cx="660" cy="60"  r="1.5"/>
    <circle cx="780" cy="240" r="1.5"/>
    <circle cx="900" cy="120" r="1.5"/>
    <circle cx="1020" cy="60"  r="1.5"/>
    <circle cx="1140" cy="180" r="1.5"/>
  </g>

  <ellipse cx="220" cy="160" rx="280" ry="160" fill="url(#glow)"/>

  <g transform="translate(80 60)" filter="url(#bannerShadow)">
    <path d="M100 8 L188 38 L188 110 C188 168 148 198 100 210 C52 198 12 168 12 110 L12 38 Z"
          fill="url(#shieldGrad2)" stroke="#e6f7ff" stroke-width="3" stroke-linejoin="round"/>
    <g stroke="#0a1929" stroke-width="7" stroke-linecap="round">
      <line x1="58"  y1="76"  x2="142" y2="76"/>
      <line x1="70"  y1="84"  x2="70"  y2="170"/>
      <line x1="100" y1="84"  x2="100" y2="170"/>
      <line x1="130" y1="84"  x2="130" y2="170"/>
    </g>
    <line x1="58" y1="124" x2="142" y2="124" stroke="#0a1929" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>

    <g transform="translate(170 36)">
      <circle r="28" fill="url(#planeGrad2)" stroke="#e6f7ff" stroke-width="2.5"/>
      <path d="M-13 2 L15 -11 L9 15 L3 8 L-2 12 L-2 5 Z" fill="#ffffff" stroke-linejoin="round"/>
      <path d="M-13 2 L9 15 L3 8 Z" fill="#cfe9ff" opacity="0.75"/>
    </g>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="320" y="158" font-size="72" font-weight="800" letter-spacing="1" fill="url(#titleGrad)">GATEKEEPER</text>
    <rect x="320" y="174" width="260" height="3" fill="url(#accentLine)"/>
    <text x="320" y="212" font-size="22" font-weight="500" letter-spacing="0.5" fill="#a8d4f0">Telegram Network Access Control for OpenWrt</text>
    <text x="320" y="244" font-size="14" font-weight="400" fill="#7aa6c7" opacity="0.9">Approve / deny new devices from Telegram &#8226; nftables-backed &#8226; LuCI web UI</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600">
    <g transform="translate(880 80)">
      <rect width="120" height="32" rx="16" fill="#0e2c4f" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="60" y="21" text-anchor="middle" fill="#9be8f7">Telegram Bot</text>
    </g>
    <g transform="translate(1010 80)">
      <rect width="110" height="32" rx="16" fill="#0e2c4f" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="55" y="21" text-anchor="middle" fill="#9be8f7">OpenWrt fw4</text>
    </g>
    <g transform="translate(880 120)">
      <rect width="120" height="32" rx="16" fill="#0e2c4f" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="60" y="21" text-anchor="middle" fill="#9be8f7">nftables sets</text>
    </g>
    <g transform="translate(1010 120)">
      <rect width="110" height="32" rx="16" fill="#0e2c4f" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="55" y="21" text-anchor="middle" fill="#9be8f7">LuCI Web UI</text>
    </g>
    <g transform="translate(880 160)">
      <rect width="120" height="32" rx="16" fill="#0e2c4f" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="60" y="21" text-anchor="middle" fill="#9be8f7">Schedules</text>
    </g>
    <g transform="translate(1010 160)">
      <rect width="110" height="32" rx="16" fill="#0e2c4f" stroke="#22d3ee" stroke-width="1.4"/>
      <text x="55" y="21" text-anchor="middle" fill="#9be8f7">Backup / Restore</text>
    </g>
  </g>

  <rect x="0" y="316" width="1200" height="4" fill="url(#accentLine)"/>
</svg>
